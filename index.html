<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrom Multiplayer Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Carrom Playable Prototype</h1>

      <section class="setup-panel">
        <label>
          Your name
          <input id="playerNameInput" type="text" maxlength="20" placeholder="Enter your name" value="Player" />
        </label>
        <label>
          Choose your color
          <select id="colorSelect">
            <option value="white">White</option>
            <option value="black">Black</option>
          </select>
        </label>
        <button id="startBtn" type="button">Start Game</button>
        <button id="resetBtn" type="button">Reset Board</button>
      </section>

      <section class="game-row">
        <div class="game-area">
          <canvas id="carromCanvas" width="900" height="900" aria-label="Carrom board"></canvas>
          <p id="status">Set your name and color, then start.</p>
        </div>

        <aside class="scoreboard">
          <article class="player-card">
            <h2 id="playerNameLabel">Player</h2>
            <p id="playerColorLabel">Color: White</p>
            <p>Score: <strong id="playerScore">0</strong></p>
          </article>
          <article class="player-card">
            <h2 id="aiNameLabel">AI</h2>
            <p id="aiColorLabel">Color: Black</p>
            <p>Score: <strong id="aiScore">0</strong></p>
          </article>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
